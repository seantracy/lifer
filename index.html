<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifer Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="grid" id="color-grid">
        <section class="tile" data-index="0">
            <div class="counter" aria-label="counter value">
                <input class="player-name" type="text" value="Player 1" aria-label="Player name">
                <span class="counter-value">40</span>
            </div>
            <span class="tile-ellipsis" aria-hidden="true">•••</span>
        </section>
        <section class="tile" data-index="1">
            <div class="counter" aria-label="counter value">
                <input class="player-name" type="text" value="Player 2" aria-label="Player name">
                <span class="counter-value">40</span>
            </div>
            <span class="tile-ellipsis" aria-hidden="true">•••</span>
        </section>
        <section class="tile" data-index="2">
            <div class="counter" aria-label="counter value">
                <input class="player-name" type="text" value="Player 4" aria-label="Player name">
                <span class="counter-value">40</span>
            </div>
            <span class="tile-ellipsis" aria-hidden="true">•••</span>
        </section>
        <section class="tile" data-index="3">
            <div class="counter" aria-label="counter value">
                <input class="player-name" type="text" value="Player 3" aria-label="Player name">
                <span class="counter-value">40</span>
            </div>
            <span class="tile-ellipsis" aria-hidden="true">•••</span>
        </section>
        <button class="reset-button" id="reset-button" type="button" aria-label="Reset all counters">
            <img class="reset-button-icon" src="reset.png" alt="">
        </button>
    </main>

    <div class="modal-backdrop" id="tile-modal" hidden aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Tile details">
            <p class="modal-title">Commander damage received</p>
            <button class="modal-close" id="tile-modal-close" type="button" aria-label="Close modal">Close</button>
            <div class="modal-grid" id="modal-grid">
                <section class="tile" data-index="0">
                    <div class="counter" aria-label="counter value">
                        <input class="player-name" type="text" value="Player 1" aria-label="Player name">
                        <span class="counter-value">0</span>
                    </div>
                </section>
                <section class="tile" data-index="1">
                    <div class="counter" aria-label="counter value">
                        <input class="player-name" type="text" value="Player 2" aria-label="Player name">
                        <span class="counter-value">0</span>
                    </div>
                </section>
                <section class="tile" data-index="2">
                    <div class="counter" aria-label="counter value">
                        <input class="player-name" type="text" value="Player 4" aria-label="Player name">
                        <span class="counter-value">0</span>
                    </div>
                </section>
                <section class="tile" data-index="3">
                    <div class="counter" aria-label="counter value">
                        <input class="player-name" type="text" value="Player 3" aria-label="Player name">
                        <span class="counter-value">0</span>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
